services:
  postgres:
    image: postgres:16-alpine
    container_name: jeofton-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jeofton
    ports:
      # 5433 no host evita conflito com PostgreSQL instalado na máquina (porta 5432)
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jeofton"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
