services:
  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - jeofton_rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  db-users:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_users
    ports:
      - "5434:5432"
    volumes:
      - jeofton_db_users:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d db_users']
      interval: 5s
      timeout: 5s
      retries: 5

  db-restaurants:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_restaurants
    ports:
      - "5435:5432"
    volumes:
      - jeofton_db_restaurants:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d db_restaurants']
      interval: 5s
      timeout: 5s
      retries: 5

  db-orders:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_orders
    ports:
      - "5436:5432"
    volumes:
      - jeofton_db_orders:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d db_orders']
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build: ./user-service
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      DATABASE_URL: postgresql://postgres:postgres@db-users:5432/db_users
      PORT: '3001'
    depends_on:
      db-users:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  restaurant-service:
    build: ./restaurant-service
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db-restaurants:5432/db_restaurants
      PORT: '3002'
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      USER_SERVICE_URL: http://user-service:3001
    depends_on:
      db-restaurants:
        condition: service_healthy
      user-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  order-service:
    build: ./order-service
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db-orders:5432/db_orders
      PORT: '3003'
      USER_SERVICE_URL: http://user-service:3001
      RESTAURANT_SERVICE_URL: http://restaurant-service:3002
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    depends_on:
      db-orders:
        condition: service_healthy
      user-service:
        condition: service_started
      restaurant-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    restart: unless-stopped
    ports:
      - '3004:3004'
    environment:
      PORT: '3004'
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      PORT: '3000'
      USER_SERVICE_URL: http://user-service:3001
      RESTAURANT_SERVICE_URL: http://restaurant-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
    depends_on:
      - user-service
      - restaurant-service
      - order-service
      - notification-service

volumes:
  jeofton_db_users:
  jeofton_db_restaurants:
  jeofton_db_orders:
  jeofton_rabbitmq:
